<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🚨 نظام ميراي - ملفات مسربة</title>
    <style>
        :root {
            --primary-color: #00ff66; /* لون الاختراق الأخضر */
            --secret-color: #ff0033;  /* لون الملفات السرية المحظورة */
            --bg-color: #020503;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* تأثير تشويش شاشات المراقبة العسكرية */
        body::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            z-index: 10; background-size: 100% 4px; pointer-events: none;
        }

        .hacker-panel {
            border: 1px solid var(--primary-color);
            background: rgba(0, 15, 5, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
            max-width: 900px; width: 100%;
            padding: 20px; border-radius: 6px;
            margin-top: 10px; text-align: center;
        }

        .panel-header {
            font-size: 20px; font-weight: bold;
            border-bottom: 2px dashed var(--primary-color);
            padding-bottom: 10px; margin-bottom: 20px;
            text-shadow: 0 0 10px var(--primary-color);
        }

        /* أزرار التنقل بين التصميم العام والسري */
        .tabs-container {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;
        }

        .tab-btn {
            background: transparent; color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 10px 20px; font-family: monospace; font-size: 15px;
            cursor: pointer; transition: all 0.3s; width: 45%;
        }

        .tab-btn.active {
            background: var(--primary-color); color: black;
            box-shadow: 0 0 15px var(--primary-color); font-weight: bold;
        }

        .tab-btn.secret-tab {
            color: var(--secret-color); border-color: var(--secret-color);
        }

        .tab-btn.secret-tab.active {
            background: var(--secret-color); color: white;
            box-shadow: 0 0 15px var(--secret-color);
        }

        /* حاوية عرض تصاميم البرج */
        .design-viewer {
            border: 1px dashed rgba(0, 255, 102, 0.5);
            background: #000000; padding: 10px;
            border-radius: 4px; min-height: 300px;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        .design-image {
            max-width: 100%; max-height: 500px;
            object-fit: contain; display: none;
            border: 1px solid #333;
        }

        .design-image.active { display: block; animation: static-effect 0.4s ease; }

        .system-logs {
            text-align: right; font-size: 13px; color: #88ff88;
            background: rgba(0,0,0,0.4); padding: 10px;
            margin-top: 15px; border-radius: 4px; max-height: 80px; overflow-y: auto;
        }

        @keyframes static-effect {
            0% { opacity: 0.3; filter: brightness(2) contrast(2); }
            50% { opacity: 0.7; filter: brightness(0.5); }
            100% { opacity: 1; filter: none; }
        }
    </style>
</head>
<body>

    <div class="hacker-panel" id="mainPanel">
        <div class="panel-header">📡 تم خرق النظام مركزي - مستخرج المخططات الهندسية</div>
        
        <!-- الأزرار التفاعلية للتبديل -->
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchDesign('general', this)">المخطط العام للبرج</button>
            <button class="tab-btn secret-tab" onclick="switchDesign('secret', this)">⚠️ المخطط السري (المخترق)</button>
        </div>

        <!-- نافذة استعراض المخططات -->
        <div class="design-viewer">
            <!-- صورة التصميم العام -->
            <img id="generalDesign" class="design-image active" src="general.png" alt="المخطط العام لبرج ميراي">
            
            <!-- صورة التصميم السري -->
            <img id="secretDesign" class="design-image" src="secret.png" alt="المخطط المخترق السري لبرج ميراي">
        </div>

        <!-- أسطر الأوامر الوهمية لتعزيز الأجواء -->
        <div class="system-logs" id="logBox">
            [نظام]: تم الاتصال بنجاح بـ MIRAI_CORE_BACKUP...<br>
            [تنبيه]: جاري استعراض المخطط العام الافتراضي المصرح به...
        </div>
    </div>

    <script>
        function switchDesign(type, btn) {
            // 1. إلغاء تفعيل كل الأزرار والصور أولاً
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.design-image').forEach(img => img.classList.remove('active'));
            
            const logBox = document.getElementById('logBox');
            
            // 2. تفعيل التبويب المختار
            btn.classList.add('active');
            
            if(type === 'general') {
                document.getElementById('generalDesign').classList.add('active');
                document.getElementById('mainPanel').style.borderColor = '#00ff66';
                document.getElementById('mainPanel').style.boxShadow = '0 0 20px rgba(0, 255, 102, 0.3)';
                logBox.innerHTML += "<br>[نظام]: تم العودة للمخطط العام المفتوح.";
            } else {
                document.getElementById('secretDesign').classList.add('active');
                // تحويل لون الإطار بالكامل للأحمر النيوني لإشعار القارئ بالخطر والاختراق الممنوع
                document.getElementById('mainPanel').style.borderColor = '#ff0033';
                document.getElementById('mainPanel').style.boxShadow = '0 0 20px rgba(255, 0, 51, 0.5)';
                logBox.innerHTML += "<br><span style='color:#ff3333'>[تحذير]: تم فك تشفير شفرة الاحتواء الفيدرالي.. عرض المخطط السري السفلي!</span>";
            }
            
            // جعل سجلات النظام تنزل لأسفل تلقائياً
            logBox.scrollTop = logBox.scrollHeight;
        }
    </script>
</body>
</html>
