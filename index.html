<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>🚨 نظام ميراي المركزي</title>
    <style>
        :root {
            --primary-color: #ff0033;
            --bg-color: #030000;
        }
        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: monospace, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        .terminal-container {
            border: 2px solid var(--primary-color);
            background-color: #0f0003;
            box-shadow: 0 0 25px rgba(255, 0, 51, 0.5);
            max-width: 650px;
            width: 100%;
            padding: 25px;
            border-radius: 4px;
            text-align: center;
        }
        .system-header {
            font-size: 22px;
            font-weight: bold;
            border-bottom: 2px dashed var(--primary-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .terminal-screen {
            font-size: 20px;
            line-height: 1.6;
            color: #ffb3b3;
            text-align: right;
            min-height: 200px;
            white-space: pre-wrap;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 0, 51, 0.2);
            padding: 15px;
            background: #000000;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: var(--primary-color);
            animation: blink 0.6s infinite;
            vertical-align: middle;
        }
        .terminal-btn {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 0, 51, 0.2);
        }
        .terminal-btn:hover {
            background-color: var(--primary-color);
            color: black;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="system-header">⚠️ نـظـام مـيـراي الـمـركـزي ⚠️</div>
        <div id="terminalScreen" class="terminal-screen">اضغط أدناه لفك تشفير البث العسكري الطارئ واستقبل التوجيهات...</div>
        <button id="actionBtn" class="terminal-btn" onclick="initializeBroadcast()">بث حالة الاحتواء 📡</button>
    </div>

    <audio id="miraiAudio" preload="auto">
        <source src="mirai.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById("miraiAudio");
        const screen = document.getElementById("terminalScreen");
        
        // النص مفرغ بدون رموز خاصة تسبب مشاكل لبعض المتصفحات
        const fullText = "إلى جميع المواطنين...\nتم إعلان حالة احتواء من المستوى الأحمر.\n\nبرج ميراي المركزي يتعرض للهجوم!\n\nأي وجود بشري قرب المنطقة سيتم التعامل معه كتهديد مباشر.\n\nابقوا في الملاجئ ولا تغادروا أماكنكم!";
        
        let index = 0;

        function startTyping() {
            if (index < fullText.length) {
                let currentChar = fullText.charAt(index);
                
                if (index === 0) screen.innerHTML = ""; 

                if (currentChar === '\n') {
                    screen.innerHTML += '<br>';
                } else {
                    screen.innerHTML += currentChar;
                }
                
                index++;
                // السرعة الثابتة والموزونة الحسابية لتغطية الـ 21 ثانية الصوتية بالملي ثانية
                setTimeout(startTyping, 132);
            } else {
                screen.innerHTML += '<span class="cursor"></span>';
            }
        }

        function initializeBroadcast() {
            document.getElementById("actionBtn").style.display = "none";
            audio.load();
            audio.volume = 1.0;
            audio.play().catch(error => { console.log("Audio play error"); });
            if (navigator.vibrate) { navigator.vibrate(); }
            startTyping();
        }
    </script>
</body>
</html>
